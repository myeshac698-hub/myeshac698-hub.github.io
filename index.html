<!DOCTYPE html>
<html>

<head>
  <title>(My)esha's Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="thoughts.html">Thoughts</a>
  </nav>

  <h1>(My)esha's Blog</h1>

  <p>
    Hi, I'm Myesha. I have lots of opinions on things and I like sharing them.
    I thought a blog would be a good place to keep them.
  </p>
  
  <section>
    <h2>Latest Posts</h2>
    <ul id="latest-posts"></ul>
    <script src="posts.js"></script>
    <blockquote>
      "An ongoing collection of things I've read,
      watched, loved, disliked, and can't stop
      thinking about."
    </blockquote>
  </section>
  
  <script>

    const latestList =
      document.getElementById("latest-posts");

    // copy + sort newest first
    const sortedPosts = [...posts].sort(
      (a, b) => new Date(b.date) - new Date(a.date)
    );

    // show newest 3 posts
    const latestPosts = sortedPosts.slice(0, 3);

    latestPosts.forEach(post => {

      const li = document.createElement("li");

      li.innerHTML = `
        <a href="${post.url}">
          ${post.title}
        </a>
        <small>(${post.date})</small>
      `;

      latestList.appendChild(li);

    });

  </script>

</body>
</html>
